<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCDトレードオフ・シミュレーター</title>
<meta name="description" content="品質(Q)・コスト(C)・納期(D)のトレードオフを、ドラッグ操作で体感できるシミュレーター。優先順位の対話に。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDF1EF;
  --line:#D3DCD8;
  --surface:#FFFFFF;
  --ink:#22302E;
  --ink-soft:#5C6B68;
  --q:#0E7C66;
  --c:#B07A14;
  --d:#3B6EA5;
  --alert:#B3423A;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"IBM Plex Sans JP",sans-serif;
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:28px 28px;
  line-height:1.75;
}
.mono{font-family:"IBM Plex Mono",monospace}
.wrap{max-width:760px;margin:0 auto;padding:0 16px}

/* ---- header ---- */
header{padding:32px 0 24px}
.header-top{display:flex;justify-content:space-between;align-items:center}
.eyebrow{
  font-family:"IBM Plex Mono",monospace;
  font-size:12px;letter-spacing:.22em;
  color:var(--ink-soft);text-transform:uppercase;
}
.lang-switch{display:flex;gap:4px}
.lang-switch button{
  font-family:"IBM Plex Mono",monospace;font-size:11.5px;
  border:1px solid var(--line);background:#fff;color:var(--ink-soft);
  border-radius:6px;padding:5px 10px;cursor:pointer;
}
.lang-switch button[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
h1{font-size:clamp(22px,5vw,32px);font-weight:700;line-height:1.4;margin:14px 0 12px}
header p{color:var(--ink-soft);font-size:14px;max-width:44em}

/* ---- console ---- */
.console{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:0 2px 0 rgba(34,48,46,.05);
  padding:20px 16px 24px;
}
.console-head{
  display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:1px dashed var(--line);
  padding-bottom:10px;margin-bottom:6px;
}
.console-head .label{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.18em;color:var(--ink-soft)}
.sum{font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--ink-soft)}
.sum b{color:var(--ink);font-size:16px}
.mode-row{display:flex;align-items:center;gap:10px;margin:8px 0 2px;flex-wrap:wrap}
.tone-btn{
  font-family:inherit;font-size:12px;font-weight:500;
  border:1px solid var(--line);background:#fff;color:var(--ink-soft);
  border-radius:999px;padding:5px 12px;cursor:pointer;
}
.tone-btn[aria-pressed="true"]{background:var(--alert);border-color:var(--alert);color:#fff}
.tone-note{font-size:11.5px;color:var(--ink-soft)}

.chart-wrap{display:flex;justify-content:center}
svg{width:100%;max-width:440px;height:auto;touch-action:none;user-select:none}
.grid-tri{fill:none;stroke:var(--line);stroke-width:1}
.grid-zero{stroke:var(--ink-soft);stroke-width:1.4}
.tick-zero{font-weight:700;fill:var(--ink)}
.axis-line{stroke:var(--line);stroke-width:1;stroke-dasharray:2 3}
.data-poly{fill:rgba(14,124,102,.14);stroke:var(--ink);stroke-width:1.6;stroke-linejoin:round}
.data-poly.danger{fill:rgba(179,66,58,.16);stroke:var(--alert)}
.handle{stroke:#fff;stroke-width:2.5;cursor:grab}
.handle.dragging{cursor:grabbing}
.handle-hit{fill:transparent;cursor:grab}
.axis-label{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:700}
.tick-label{font-family:"IBM Plex Mono",monospace;font-size:9px;fill:var(--ink-soft)}
.lock-badge{font-size:15px}
.hint{
  min-height:1.5em;text-align:center;font-size:12.5px;color:var(--d);
  font-weight:500;margin-top:2px;
}

/* ---- 健全度パネル ---- */
.assess{
  margin-top:14px;border:1px solid var(--line);border-radius:8px;
  background:#FDFDFC;padding:14px 14px 12px;
}
.assess-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.score-label{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.18em;color:var(--ink-soft)}
.score-val{font-size:38px;font-weight:700;line-height:1;color:var(--q)}
.score-val.warn{color:var(--c)}
.score-val.danger{color:var(--alert)}
.score-max{font-size:14px;color:var(--ink-soft)}
.score-comment{font-size:14px;font-weight:500;flex:1;min-width:12em}
.advice{list-style:none;margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
.advice li{
  font-size:13px;color:var(--ink-soft);padding-left:1.5em;position:relative;margin-bottom:5px;
}
.advice li::before{content:"▲";position:absolute;left:0;font-size:10px;top:3px;color:var(--c)}
.advice li.ok::before{content:"●";color:var(--q)}
.advice li.bad::before{color:var(--alert)}
.advice li b{color:var(--ink);font-weight:700}
.advice li.bad b{color:var(--alert)}
.risks{list-style:none;margin:5px 0 8px;padding:0}
.risks li{
  padding-left:1.3em;position:relative;margin-bottom:3px;font-size:12.5px;
}
.risks li::before{content:"–";position:absolute;left:.3em;top:0;color:var(--ink-soft);font-size:12.5px}

/* ---- axis cards ---- */
.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
@media(max-width:560px){.controls{grid-template-columns:1fr}}
.axis-card{
  border:1px solid var(--line);
  border-top:3px solid var(--axis);
  border-radius:8px;
  padding:12px 12px 14px;
  background:#FDFDFC;
}
.axis-card.is-locked{background:#F4F2EC;border-style:dashed;border-top-style:solid}
.axis-card .row1{display:flex;justify-content:space-between;align-items:flex-start}
.axis-name{font-weight:700;font-size:13.5px}
.axis-name small{display:block;font-weight:400;font-size:11px;color:var(--ink-soft)}
.lock-btn{
  border:1px solid var(--line);background:#fff;border-radius:6px;
  font-size:15px;line-height:1;padding:6px 9px;cursor:pointer;
}
.lock-btn[aria-pressed="true"]{background:var(--ink);border-color:var(--ink)}
.readout{
  font-family:"IBM Plex Mono",monospace;
  font-size:34px;font-weight:700;color:var(--axis);
  margin:4px 0 0;line-height:1.1;
}
.readout-sub{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-soft);display:block;margin-bottom:2px}
.axis-card input[type=range]{width:100%;accent-color:var(--axis);margin:6px 0 8px}
.num-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft)}
.axis-card input[type=number]{
  width:76px;font-family:"IBM Plex Mono",monospace;font-size:14px;
  padding:4px 6px;border:1px solid var(--line);border-radius:6px;color:var(--ink);
}
.axis-card input:disabled{opacity:.45}
:focus-visible{outline:2px solid var(--d);outline-offset:2px}

/* ---- actions ---- */
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn{
  font-family:inherit;font-size:13.5px;font-weight:500;
  border-radius:8px;padding:10px 16px;cursor:pointer;
  border:1px solid var(--ink);background:#fff;color:var(--ink);
}
.btn.primary{background:var(--ink);color:#fff}
.btn:hover{transform:translateY(-1px)}
@media(prefers-reduced-motion:reduce){.btn:hover{transform:none}}

/* ---- content sections ---- */
section.text{margin-top:44px}
h2{font-size:19px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
h2::before{content:"";display:inline-block;width:14px;height:14px;border:3px solid var(--ink);border-radius:2px;flex:none}
section.text p{font-size:14.5px;margin-bottom:12px;max-width:46em}
section.text ul{font-size:14.5px;padding-left:1.4em;margin-bottom:12px}
section.text li{margin-bottom:6px}
.scenario{
  background:var(--surface);border-left:4px solid var(--d);
  border-radius:6px;padding:14px 16px;font-size:14px;margin:16px 0;
}
.scenario b{color:var(--d)}

/* ---- books ---- */
.books-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.books-grid{grid-template-columns:1fr}}
.book{
  background:var(--surface);border:1px solid var(--line);border-radius:8px;
  padding:14px;font-size:13.5px;
}
.book .tag{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.15em;color:var(--ink-soft)}
.book h3{font-size:14.5px;margin:4px 0 6px}
.book a{color:var(--d)}
.placeholder-note{font-size:12px;color:var(--ink-soft);margin-top:8px}

/* ---- footer ---- */
footer{
  margin-top:56px;padding:24px 0 40px;border-top:1px solid var(--line);
  font-size:12px;color:var(--ink-soft);
}
footer p{margin-bottom:6px}
footer a{color:var(--ink-soft)}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="header-top">
    <div class="eyebrow">QCD Trade-off Simulator</div>
    <div class="lang-switch" role="group" aria-label="Language">
      <button data-lang="ja" aria-pressed="true">日本語</button>
      <button data-lang="en" aria-pressed="false">EN</button>
    </div>
  </div>
  <h1 id="heroTitle"></h1>
  <p id="heroLead"></p>
</header>

<main>
<section class="console" aria-label="QCD Simulator">
  <div class="console-head">
    <span class="label">TRADE-OFF CONSOLE</span>
    <span class="sum"><span id="sumLabel"></span> <b id="sumVal">±0</b><span id="sumNote"></span></span>
  </div>
  <div class="mode-row">
    <button class="tone-btn" id="toneBtn" aria-pressed="false"></button>
    <span class="tone-note" id="toneNote" hidden></span>
  </div>

  <div class="chart-wrap">
    <svg id="chart" viewBox="0 0 440 400" role="img" aria-label="QCD radar chart">
      <g id="gridLayer"></g>
      <g id="axisLayer"></g>
      <polygon id="dataPoly" class="data-poly" points=""></polygon>
      <g id="handleLayer"></g>
      <g id="labelLayer"></g>
    </svg>
  </div>
  <p class="hint" id="hint" aria-live="polite"></p>

  <div class="assess" aria-live="polite">
    <div class="assess-head">
      <div>
        <span class="score-label" id="scoreLabel"></span><br>
        <span class="score-val mono" id="scoreVal">100</span><span class="score-max mono"> /100</span>
      </div>
      <p class="score-comment" id="scoreComment"></p>
    </div>
    <ul class="advice" id="adviceList"></ul>
  </div>

  <div class="controls" id="controls"></div>

  <div class="actions">
    <button class="btn primary" id="resetBtn"></button>
    <button class="btn" id="scenarioBtn"></button>
  </div>
</section>

<section class="text" id="secQcd"></section>
<section class="text" id="secLock"></section>

<section class="text">
  <h2 id="booksH"></h2>
  <div class="books-grid" id="booksGrid"></div>
</section>
</main>

<footer>
  <p id="footNote"></p>
  <p id="footDisclosure"></p>
  <p><a href="privacy.html" id="footPrivacy"></a></p>
  <p>© 2026 QCD Trade-off Simulator</p>
</footer>

</div>

<script>
"use strict";
const TOTAL = 300;
const BASE = 100;   // 表示上の±0に対応する内部値
const CX = 220, CY = 210, R = 150;
const EXTREME_LOW = 40, EXTREME_HIGH = 180;   // 内部値(±表示では −60 / +80)

const AXES = [
  {key:"Q", color:"var(--q)", colorHex:"#0E7C66", angle:-90},
  {key:"C", color:"var(--c)", colorHex:"#B07A14", angle:150},

];

/* ================= 多言語辞書 ================= */
const I18N = {

  heroLead:"3つの軸はすべて高いほど望ましい「満足度」で表します。Qは品質の高さ、Cは安さ、Dは納期の短さ。標準(±0)を基準に、どこかを高めると、必ずどこかを譲ることになります。頂点のドラッグやスライダーで動かしながら、優先順位のバランスをご一緒に確認ください。🔒で1軸を固定できます。",

  zeroTick:"±0 標準",
  secQcd:`<h2>QCDとは</h2>
    <p>QCDは、ものづくりやプロジェクトの計画で広く使われる3つの評価軸です。<b>Q = Quality(品質)</b>、<b>C = Cost(コスト)</b>、<b>D = Delivery(納期)</b>。この3つは互いにトレードオフの関係にあり、限られたリソースの中ですべてを同時に最大化することはできません。</p>
    <p>ここで注意したいのは、生の値のままだと「高くて嬉しいのはQだけ」という点です。コストは安いほど、納期は短いほど望ましい。そこでこのチャートでは、3軸すべてを<b>高いほど望ましい「満足度」</b>に揃えています。Cの+は「安い」、Dの+は「短い」。三角形が大きいほど良い状態、±0の基準線より内側に凹んだ軸が、譲っている軸です。</p>
    <p>そのうえで制約を「増減合計±0のゼロサム」として単純化しています。ある軸を+すると、その分は必ず他の軸の−として現れます。どこに重点を置くか、関係者全員で認識を合わせるための道具としてお使いください。</p>`,
  secLock:`<h2>ロック機能の使いかた</h2>

    <div class="scenario"><b>例: 納期を最優先にする場合</b><br>

    <ul>
      <li>固定できるのは同時に1軸まで(2軸を固定すると残る1軸も動かせなくなるため、2つ目を固定すると先の固定は自動で外れます)</li>
      <li>値の範囲は−100〜+200。端に達するとそこで止まります</li>
      <li>いずれかの軸が−60以下または+80以上になるとチャートが赤くなり、想定されるリスクが表示されます</li>
    </ul>`,

let LANG = (navigator.language || "en").toLowerCase().startsWith("ja") ? "ja" : "en";
let TONE = "std";   // "std" | "dev"
const T = () => TONE === "dev" ? {...I18N[LANG], ...DEV[LANG]} : I18N[LANG];

/* ================= 基本ユーティリティ ================= */
const toDisp = v => v - BASE;
const fmtSigned = v => v > 0 ? `+${v}` : v === 0 ? "±0" : `−${-v}`;
const dir = a => ({x: Math.cos(a.angle*Math.PI/180), y: Math.sin(a.angle*Math.PI/180)});
const pointAt = (a, v) => {
  const d = dir(a), r = (v/TOTAL)*R;
  return {x: CX + d.x*r, y: CY + d.y*r};
};

let values = {Q:100, C:100, D:100};   // 内部は浮動小数(0〜300)
let locked = {Q:false, C:false, D:false};
let lastChanged = null;               // 丸め調整の対象から除外する軸

/* ================= トレードオフ計算 ================= */
function setAxis(key, raw){
  if (locked[key]) return;
  const others = AXES.map(a=>a.key).filter(k => k!==key && !locked[k]);
  if (others.length === 0) return;

  const lockedSum = AXES.map(a=>a.key).filter(k=>locked[k])
                        .reduce((s,k)=>s+values[k], 0);
  const budget = TOTAL - lockedSum;
  const v = Math.min(Math.max(raw, 0), budget);
  const remain = budget - v;
  const otherSum = others.reduce((s,k)=>s+values[k], 0);

  others.forEach(k => {
    values[k] = otherSum > 1e-9
      ? remain * (values[k]/otherSum)   // 比率按分
      : remain / others.length;         // 全て0なら均等
  });
  values[key] = v;
  lastChanged = key;
  render();
}

/* 表示用: 整数丸め+ゼロサム厳守(操作軸以外で誤差吸収) */
function displayValues(){
  const d = {}; let sum = 0;
  AXES.forEach(a => { d[a.key] = Math.round(values[a.key]); sum += d[a.key]; });
  let diff = TOTAL - sum;
  if (diff !== 0){
    let cand = AXES.map(a=>a.key)
                   .filter(k => !locked[k] && k !== lastChanged)
                   .sort((x,y)=>values[y]-values[x]);
    if (cand.length === 0) cand = AXES.map(a=>a.key).filter(k=>!locked[k]);
    for (const k of cand){
      const nv = d[k] + diff;
      if (nv >= 0 && nv <= TOTAL){ d[k] = nv; break; }
    }
  }
  return d;
}

/* ================= ロック ================= */
function toggleLock(key){
  if (locked[key]){
    locked[key] = false;
    setHint("");
  } else {
    AXES.forEach(a => locked[a.key] = false);   // 同時ロックは1軸まで
    values[key] = Math.round(values[key]);       // 固定値は整数に
    locked[key] = true;
    showLockHint(key);
  }
  render();
}
function showLockHint(key){
  const t = T().axes[key];
  setHint(T().hintLocked(t.name, t.short, fmtSigned(toDisp(values[key]))));
}
function setHint(msg){ document.getElementById("hint").textContent = msg; }

/* ================= 健全度評価 ================= */
function assess(d){
  const dev = AXES.reduce((s,a)=>s+Math.abs(d[a.key]-BASE), 0);
  const score = Math.max(0, Math.round(100 - dev/4));

  const extremes = [];
  AXES.forEach(a => {
    if (d[a.key] <= EXTREME_LOW)       extremes.push({key:a.key, type:"low"});
    else if (d[a.key] >= EXTREME_HIGH) extremes.push({key:a.key, type:"high"});
  });

  const band = score >= 90 ? 0 : score >= 70 ? 1 : score >= 50 ? 2 : score >= 30 ? 3 : 4;
  return {score, band, extremes, danger: extremes.length > 0};
}

/* ================= SVG構築 ================= */
const svg = document.getElementById("chart");
const NS = "http://www.w3.org/2000/svg";
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
let zeroTickEl = null;

function buildStatic(){
  const grid = document.getElementById("gridLayer");
  for (let v = 50; v <= TOTAL; v += 50){
    const pts = AXES.map(a => { const p = pointAt(a, v); return `${p.x},${p.y}`; }).join(" ");
    grid.appendChild(el("polygon", {points: pts, class: v === BASE ? "grid-tri grid-zero" : "grid-tri"}));
  }
  const axisL = document.getElementById("axisLayer");
  AXES.forEach(a => {
    const p = pointAt(a, TOTAL);
    axisL.appendChild(el("line", {x1:CX, y1:CY, x2:p.x, y2:p.y, class:"axis-line"}));
  });
  [[BASE,"zero"],[200,"+100"],[300,"+200"]].forEach(([v,label]) => {
    const p = pointAt(AXES[0], v);
    const t = el("text", {x:p.x+7, y:p.y+3, class: label==="zero" ? "tick-label tick-zero" : "tick-label"});
    if (label === "zero") zeroTickEl = t; else t.textContent = label;
    axisL.appendChild(t);
  });
  const hL = document.getElementById("handleLayer");
  const lL = document.getElementById("labelLayer");
  AXES.forEach(a => {
    const lp = pointAt(a, TOTAL*1.16);
    const label = el("text", {x:lp.x, y:lp.y, class:"axis-label",
      fill:a.colorHex, "text-anchor":"middle", "dominant-baseline":"middle"});
    lL.appendChild(label);
    a._label = label;

    const hit = el("circle", {r:24, class:"handle-hit", "data-axis":a.key});
    const h   = el("circle", {r:9,  class:"handle", fill:a.colorHex, "data-axis":a.key});
    hL.appendChild(hit); hL.appendChild(h);
    a._hit = hit; a._handle = h;

    const badge = el("text", {class:"lock-badge", "text-anchor":"middle",
      "dominant-baseline":"middle", visibility:"hidden"});
    badge.textContent = "🔒";
    lL.appendChild(badge);
    a._badge = badge;
  });
}

/* ================= ドラッグ ================= */
let dragAxis = null;
function svgPoint(evt){
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}
svg.addEventListener("pointerdown", evt => {
  const key = evt.target.getAttribute && evt.target.getAttribute("data-axis");
  if (!key || locked[key]) return;
  dragAxis = key;
  svg.setPointerCapture(evt.pointerId);
  AXES.find(a=>a.key===key)._handle.classList.add("dragging");
  evt.preventDefault();
});
svg.addEventListener("pointermove", evt => {
  if (!dragAxis) return;
  const a = AXES.find(x=>x.key===dragAxis);
  const p = svgPoint(evt), d = dir(a);
  const proj = ((p.x-CX)*d.x + (p.y-CY)*d.y) / R * TOTAL;  // 軸方向への射影
  setAxis(dragAxis, proj);
});
["pointerup","pointercancel"].forEach(ev => svg.addEventListener(ev, () => {
  if (!dragAxis) return;
  AXES.find(a=>a.key===dragAxis)._handle.classList.remove("dragging");
  dragAxis = null;
}));

function buildControls(){
  const box = document.getElementById("controls");
  AXES.forEach(a => {
    const card = document.createElement("div");
    card.className = "axis-card";
    card.style.setProperty("--axis", a.colorHex);
    card.innerHTML = `
      <div class="row1">
        <span class="axis-name"><span data-title></span><small data-sub2></small></span>
        <button class="lock-btn" aria-pressed="false">🔓</button>
      </div>
      <div class="readout mono" data-readout>±0</div>
      <span class="readout-sub" data-sub></span>
      <input type="range" min="${toDisp(0)}" max="${toDisp(TOTAL)}" step="1" value="0">
      <div class="num-row">
        <label for="num-${a.key}" data-numlabel></label>
        <input type="number" id="num-${a.key}" min="${toDisp(0)}" max="${toDisp(TOTAL)}" step="1" value="0">
      </div>`;
    box.appendChild(card);
    a._card     = card;
    a._title    = card.querySelector("[data-title]");
    a._sub2     = card.querySelector("[data-sub2]");
    a._readout  = card.querySelector("[data-readout]");
    a._sub      = card.querySelector("[data-sub]");
    a._numLabel = card.querySelector("[data-numlabel]");
    a._slider   = card.querySelector("input[type=range]");
    a._num      = card.querySelector("input[type=number]");
    a._lockBtn  = card.querySelector(".lock-btn");

    a._slider.addEventListener("input", e => setAxis(a.key, +e.target.value + BASE));
    a._num.addEventListener("change", e => setAxis(a.key, +e.target.value + BASE));
    a._lockBtn.addEventListener("click", () => toggleLock(a.key));
  });
}

/* ================= 描画 ================= */
function render(){
  const t = T();
  const d = displayValues();
  const pts = AXES.map(a => { const p = pointAt(a, values[a.key]); return `${p.x},${p.y}`; }).join(" ");
  document.getElementById("dataPoly").setAttribute("points", pts);

  AXES.forEach(a => {
    const p = pointAt(a, values[a.key]);
    a._handle.setAttribute("cx", p.x); a._handle.setAttribute("cy", p.y);
    a._hit.setAttribute("cx", p.x);    a._hit.setAttribute("cy", p.y);
    a._badge.setAttribute("x", p.x);   a._badge.setAttribute("y", p.y - 20);
    a._badge.setAttribute("visibility", locked[a.key] ? "visible" : "hidden");
    a._handle.style.cursor = locked[a.key] ? "not-allowed" : "grab";

    a._readout.textContent = fmtSigned(toDisp(d[a.key]));
    a._sub.textContent = t.absLabel(d[a.key]);
    if (document.activeElement !== a._slider) a._slider.value = toDisp(d[a.key]);
    if (document.activeElement !== a._num)    a._num.value    = toDisp(d[a.key]);
    a._slider.disabled = locked[a.key];
    a._num.disabled    = locked[a.key];
    a._lockBtn.textContent = locked[a.key] ? "🔒" : "🔓";
    a._lockBtn.setAttribute("aria-pressed", locked[a.key]);
    a._card.classList.toggle("is-locked", locked[a.key]);
  });

  document.getElementById("sumVal").textContent =
    fmtSigned(toDisp(d.Q) + toDisp(d.C) + toDisp(d.D));

  // 健全度の反映
  const r = assess(d);
  document.getElementById("dataPoly").classList.toggle("danger", r.danger);
  const sv = document.getElementById("scoreVal");
  sv.textContent = r.score;
  sv.className = "score-val mono" + (r.danger ? " danger" : r.score < 70 ? " warn" : "");
  document.getElementById("scoreComment").textContent = t.comments[r.band];

  const items = r.extremes.map(e => ({...t.advice[e.type][e.key], cls:"bad"}));
  if (items.length === 0){
    if (r.score >= 90){
      items.push({title:t.adviceBalanced, risks:[], cls:"ok"});
    } else {
      const lowest = AXES.reduce((m,a)=> d[a.key] < d[m.key] ? a : m, AXES[0]);
      const ta = t.axes[lowest.key];
      items.push({title:t.adviceLowest(ta.name, ta.short), risks:[], cls:""});
    }
  }
  const list = document.getElementById("adviceList");
  list.innerHTML = "";
  items.forEach(item => {
    const li = document.createElement("li");
    if (item.cls) li.className = item.cls;
    const b = document.createElement("b");
    b.textContent = item.title;
    li.appendChild(b);
    if (item.risks.length){
      const ul = document.createElement("ul");
      ul.className = "risks";
      item.risks.forEach(rk => {
        const rl = document.createElement("li");
        rl.textContent = rk;
        ul.appendChild(rl);
      });
      li.appendChild(ul);
    }
    list.appendChild(li);
  });
}

/* ================= アクション ================= */
document.getElementById("resetBtn").addEventListener("click", () => {
  values = {Q:100, C:100, D:100};
  locked = {Q:false, C:false, D:false};
  lastChanged = null;
  setHint("");
  render();
});
document.getElementById("scenarioBtn").addEventListener("click", () => {
  values = {Q:100, C:100, D:100};
  locked = {Q:false, C:false, D:true};
  lastChanged = null;
  setHint(T().hintScenario);
  render();
});

buildStatic();
buildControls();
applyLang(LANG);
</script>
